<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Dev Menthors</title>
</head>
<body>
  <!-- Cabeçalho principal com navegação -->
  <header>
    <nav class="nav" aria-label="Menu principal">
      <!-- Logo / marca -->
      <a class="nav__brand" href="#home">
        <img src="IMG/logo.jpeg" alt="Logotipo Dev Menthors">
      </a>

      <!-- Itens de navegação (lista semântica) -->
      <ul class="nav__menu">
        <li><a href="#home">Home</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#blog">Blog</a></li>
      </ul>

      <!-- Ações / botões no cabeçalho -->
      <div class="nav__actions">
        <button id="revolution" type="button">Login</button>
      </div>
    </nav>
  </header>

  <main>
    <!-- Seção de destaque (hero) -->
    <section class="hero" id="home">
      <div class="hero__content">
        <h1>Dev<br>Menthors</h1>
        <h3>Unimar</h3>
      </div>

      <figure class="hero__image-wrapper">
        <img src="IMG/imagem1.jpeg" alt="Equipe trabalhando com tecnologia" class="hero__image">
      </figure>
    </section>

    <!-- Seção com efeito de revelação ao rolar -->
    <section class="reveal" aria-label="Demonstração de cards">
      <div class="carousel">
        <div class="track">
          <div class="card">cavalo</div>
          <div class="card">cavalo</div>
          <div class="card">cavalo</div>
          <div class="card">cavalo</div>
          <div class="card">cavalo</div>
          <div class="card">cavalo</div>
          <!-- duplicatas para loop de animação -->
          <div class="card">recuperamo a bola</div>
          <div class="card">recuperamo a bola</div>
          <div class="card">recuperamo a bola</div>
          <div class="card">recuperamo a bola</div>
          <div class="card">recuperamo a bola</div>
          <div class="card">recuperamo a bola</div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 Dev Menthors - Todos os direitos reservados.</p>
  </footer>

<script>
  // Seleciona todos os elementos que têm a classe `reveal`
  const elements = document.querySelectorAll(".reveal");

  // Cria um observador que adiciona a classe `active` quando o elemento aparece na tela
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("active");
      }
    });
  });

  // Observa cada elemento para ativar a animação quando ficar visível
  elements.forEach((el) => observer.observe(el));
</script>

</body>
</html>
